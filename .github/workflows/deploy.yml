name: Deploy docs

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build
        run: npm ci && node build.js
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel@latest
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
      - name: Ensure lux.valthrax.com DNS
        env:
          HOSTINGER_API_KEY: ${{ secrets.HOSTINGER_API_KEY }}
        run: |
          ZONE=$(curl -sf "https://developers.hostinger.com/api/dns/v1/zones/valthrax.com" \
            -H "Authorization: Bearer $HOSTINGER_API_KEY")
          if echo "$ZONE" | grep -q '"name":"lux"'; then
            echo "DNS record exists"
          else
            UPDATED=$(echo "$ZONE" | python3 -c "
          import json,sys
          z=json.load(sys.stdin)
          z.append({'type':'A','name':'lux','ttl':300,'records':[{'content':'76.76.21.21','is_disabled':False}]})
          print(json.dumps({'zone':z,'overwrite':True}))")
            curl -sf -X PUT "https://developers.hostinger.com/api/dns/v1/zones/valthrax.com" \
              -H "Authorization: Bearer $HOSTINGER_API_KEY" \
              -H "Content-Type: application/json" -d "$UPDATED"
          fi
